<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>严谨的版本控制笔记系统</title>
    
    <!-- 现代化字体 -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    
    <!-- 图标库 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- 动画库 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    
    <!-- 自定义样式 -->
    <link rel="stylesheet" href="style.css">
    
    <!-- Markdown解析器 -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.6/purify.min.js"></script>
</head>
<body>
    <div class="app-container">
        <button id="pc-drawer-toggle" class="pc-only" aria-label="收起/展开侧栏">
            <svg id="pc-drawer-toggle-icon" width="28" height="28" viewBox="0 0 28 28"><circle cx="14" cy="14" r="14" fill="#ede9fe"/><polygon id="pc-drawer-arrow" points="16,8 10,14 16,20" fill="#7c3aed"/></svg>
        </button>
        <div class="notes-list-panel drawer-collapsed animate__animated animate__fadeInLeft">
            <div class="sidebar">
                <div class="sidebar-header">
                    <span>笔记列表</span>
                </div>
                <p class="sidebar-subtitle">管理你的知识库</p>
                <input type="text" id="searchInput" class="search-input" placeholder="搜索笔记..." autocomplete="off" />
            </div>
            
            <button id="addNoteBtn" class="btn-primary">
                <i class="fas fa-plus"></i> 新建笔记
            </button>
            
            <div class="notes-container">
                <ul id="notesList"></ul>
            </div>
        </div>
        
        <!-- 主内容区域 -->
        <div class="note-main-panel animate__animated animate__fadeIn">
            <!-- 笔记头部 -->
            <div class="note-header">
                <div class="note-title-row">
                    <input type="text" id="noteTitle" placeholder="输入笔记标题...">
                </div>
                <div class="note-header-top">
                    <div class="note-meta">
                        <span class="word-count" id="wordCount">0 字</span>
                    </div>
                    <div class="note-actions">
                        <button id="editBtn" class="btn-edit">
                            <i class="fas fa-edit"></i><span class="btn-text"> 编辑笔记</span>
                        </button>
                        <button id="saveVersionBtn" class="btn-save">
                            <i class="fas fa-save"></i><span class="btn-text"> 保存版本</span>
                        </button>
                        <button id="showVersionsBtn" class="btn-history">
                            <i class="fas fa-history"></i><span class="btn-text"> 查看历史</span>
                        </button>
                        <button id="cloudSyncBtnMobile" class="btn-cloud">
                            <i class="fas fa-cloud"></i>
                        </button>
                    </div>
                </div>
            </div>
            
            <!-- 云同步按钮和弹窗 -->
            <div class="cloud-sync-bar">
                <button id="cloudSyncBtn" class="cloud-sync-btn" title="云同步"><i class="fas fa-cloud"></i></button>
            </div>
            <div id="cloudSyncModal" class="cloud-sync-modal hidden">
                <div class="cloud-sync-modal-content">
                    <h3><i class="fas fa-cloud"></i> 云同步设置</h3>
                    <label>GitHub Token <input type="password" id="cloudTokenInput" placeholder="GitHub Token" autocomplete="off"></label>
                    <label>Gist ID（可留空自动创建）<input type="text" id="cloudGistIdInput" placeholder="Gist ID"></label>
                    <div class="cloud-sync-modal-actions">
                        <button id="cloudSyncPullBtn" class="btn-primary"><i class="fas fa-download"></i> 拉取云端</button>
                        <button id="cloudSyncPushBtn" class="btn-primary"><i class="fas fa-upload"></i> 上传云端</button>
                        <button id="cloudSyncCloseBtn" class="btn-close"><i class="fas fa-times"></i></button>
                    </div>
                    <div id="cloudSyncStatus" class="cloud-sync-status"></div>
                </div>
            </div>
            
            <!-- 移动端更多按钮和菜单（仅移动端显示） -->
            <div class="mobile-menu-bar">
                <div id="mobileMenuPopup" class="mobile-menu-popup hidden">
                    <button id="mobileEditBtn" class="mobile-menu-action"><i class="fas fa-edit"></i> 编辑笔记</button>
                    <button id="mobileSaveBtn" class="mobile-menu-action"><i class="fas fa-save"></i> 保存版本</button>
                    <button id="mobileHistoryBtn" class="mobile-menu-action"><i class="fas fa-history"></i> 查看历史</button>
                    <button id="mobileCloudBtn" class="mobile-menu-action"><i class="fas fa-cloud"></i> 云同步</button>
                </div>
            </div>
            
            <!-- 移动端菜单按钮和下拉菜单 -->
            <div id="mobile-menu-btn" class="mobile-only" tabindex="0" aria-label="主菜单" style="display:none;">
                <svg width="32" height="32" viewBox="0 0 24 24"><path fill="currentColor" d="M4 6h16M4 12h16M4 18h16" stroke="#7c3aed" stroke-width="2" stroke-linecap="round"/></svg>
            </div>
            <div id="mobile-menu-dropdown" class="mobile-only" style="display:none;">
                <button id="mobile-new-note">新建笔记</button>
                <button id="mobile-upload-cloud">上传云端</button>
                <button id="mobile-download-cloud">拉取云端</button>
                <button id="mobile-more">更多设置</button>
            </div>
            
            <!-- 笔记内容区域 -->
            <div class="content-area">
                <div id="notePreview" class="markdown-body"></div>
                <textarea id="noteEditor" placeholder="在此输入笔记内容...&#10;&#10;支持 Markdown 语法：&#10;# 标题&#10;**粗体** *斜体*&#10;- 列表项&#10;```代码块```"></textarea>
            </div>
        </div>
    </div>
    
    <!-- 版本历史面板 -->
    <div id="versionsPanel">
        <div class="panel-header">
            <h3><i class="fas fa-clock"></i> 历史版本</h3>
            <button id="closeVersionsBtn" class="btn-close">
                <i class="fas fa-times"></i>
            </button>
        </div>
        <div class="versions-container">
            <ul id="versionsList"></ul>
        </div>
    </div>
    
    <!-- 加载脚本 -->
    <script src="app.js"></script>
</body>
</html>
